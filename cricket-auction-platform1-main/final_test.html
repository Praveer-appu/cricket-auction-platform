<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel Player Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #fff; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #00d4ff; }
        pre { background: #0a0a0a; padding: 15px; border-radius: 8px; overflow-x: auto; }
        button { background: #ffd700; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #ffed4e; }
    </style>
</head>
<body>
    <h1>🏏 Admin Panel Player Visibility Test</h1>
    
    <button onclick="testAPI()">Test API</button>
    <button onclick="testFiltering()">Test Filtering Logic</button>
    <button onclick="clearCache()">Clear Cache Instructions</button>
    
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Testing API...</h2>';
            
            try {
                const response = await fetch('/players?include_unapproved=true');
                const data = await response.json();
                
                let html = '<h2 class="success">✅ API Test Results</h2>';
                html += `<p><strong>Status:</strong> ${response.status}</p>`;
                html += `<p><strong>Total Players:</strong> ${data.total}</p>`;
                html += `<p><strong>Players Returned:</strong> ${data.players.length}</p>`;
                
                // Test status values
                const statuses = {};
                data.players.forEach(p => {
                    const status = p.status || 'none';
                    statuses[status] = (statuses[status] || 0) + 1;
                });
                
                html += '<h3>Status Distribution:</h3><pre>';
                html += JSON.stringify(statuses, null, 2);
                html += '</pre>';
                
                // Show first 3 players
                html += '<h3>Sample Players:</h3><pre>';
                html += JSON.stringify(data.players.slice(0, 3).map(p => ({
                    name: p.name,
                    status: p.status,
                    role: p.role,
                    is_approved: p.is_approved
                })), null, 2);
                html += '</pre>';
                
                results.innerHTML = html;
            } catch (error) {
                results.innerHTML = `<h2 class="error">❌ Error</h2><p>${error.message}</p>`;
            }
        }
        
        function testFiltering() {
            const results = document.getElementById('results');
            
            // Simulate the filtering logic
            const testPlayers = [
                { name: 'Player 1', status: 'AVAILABLE', role: 'Batsman' },
                { name: 'Player 2', status: 'available', role: 'Bowler' },
                { name: 'Player 3', status: 'sold', role: 'All-Rounder' },
                { name: 'Player 4', status: 'SOLD', role: 'Wicketkeeper' }
            ];
            
            // Old logic (case-sensitive)
            const oldFiltered = testPlayers.filter(p => p.status !== 'sold');
            
            // New logic (case-insensitive)
            const newFiltered = testPlayers.filter(p => {
                const status = (p.status || 'available').toLowerCase();
                return status !== 'sold';
            });
            
            let html = '<h2 class="info">🔍 Filtering Logic Test</h2>';
            html += '<h3>Test Players:</h3><pre>' + JSON.stringify(testPlayers, null, 2) + '</pre>';
            html += `<h3 class="error">Old Logic (Case-Sensitive): ${oldFiltered.length} players</h3>`;
            html += '<pre>' + JSON.stringify(oldFiltered, null, 2) + '</pre>';
            html += `<h3 class="success">New Logic (Case-Insensitive): ${newFiltered.length} players</h3>`;
            html += '<pre>' + JSON.stringify(newFiltered, null, 2) + '</pre>';
            html += '<p class="success"><strong>✅ New logic correctly filters both "AVAILABLE" and "available"</strong></p>';
            
            results.innerHTML = html;
        }
        
        function clearCache() {
            const results = document.getElementById('results');
            results.innerHTML = `
                <h2 class="info">🧹 Clear Cache Instructions</h2>
                <ol>
                    <li><strong>Windows/Linux:</strong> Press <code>Ctrl + Shift + Delete</code></li>
                    <li><strong>Mac:</strong> Press <code>Cmd + Shift + Delete</code></li>
                    <li>Select "Cached images and files"</li>
                    <li>Click "Clear data"</li>
                    <li><strong>Hard Refresh:</strong> Press <code>Ctrl + F5</code> (or <code>Cmd + Shift + R</code> on Mac)</li>
                </ol>
                <p class="success">After clearing cache, go to <a href="/admin" style="color: #ffd700;">Admin Panel</a> and check Player Management tab.</p>
            `;
        }
        
        // Auto-run API test on load
        window.onload = () => testAPI();
    </script>
</body>
</html>
